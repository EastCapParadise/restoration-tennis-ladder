<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match History | Restoration Tennis Ladder</title>
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="images/logo.png" alt="Restoration Tennis Ladder logo" class="logo">
      <div class="brand-text">
        <h1>Restoration Tennis Ladder</h1>
      </div>
    </div>

    <button class="hamburger-btn" aria-label="Open menu" aria-expanded="false">☰</button>

    <nav>
      <a href="index.html">Home</a>
      <a href="ladder.html">Rankings</a>
      <a href="report.html">Report Match</a>
      <a href="join.html">Join</a>
      <a href="rules.html">About</a>
      <a href="history.html" class="active">Match History</a>
      <a href="contacts.html">Directory</a>
    </nav>

    <div class="mobile-nav-menu" aria-hidden="true">
      <a href="index.html">Home</a>
      <a href="ladder.html">Rankings</a>
      <a href="report.html">Report Match</a>
      <a href="join.html">Join</a>
      <a href="rules.html">About</a>
      <a href="history.html" class="active">Match History</a>
      <a href="contacts.html">Directory</a>
    </div>
  </header>

  <main>
    <div id="match-of-week" style="display:none;"></div>

    <section class="card">
      <div class="section-header">
        <div>
          <h2>Match History</h2>
          <p class="small-text">Most recent results appear first.</p>
        </div>
      </div>

      <div class="history-toolbar">
        <div class="history-filters premium-filters">
          <button type="button" class="filter-chip active" data-filter="All">All</button>
          <button type="button" class="filter-chip" data-filter="Singles">Singles</button>
          <button type="button" class="filter-chip" data-filter="Doubles">Doubles</button>
        </div>

        <div class="history-search-wrap">
          <input
            type="text"
            id="history-player-filter"
            placeholder="Search by player name"
            autocomplete="off"
          >
        </div>
      </div>

      <div id="history-list">
        <p>Loading match history...</p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
